# Prefix
set-option -g prefix C-t

# シェルは環境変数から自動検出
set-option -g default-shell "$SHELL"
set-option -g default-command "$SHELL"
set -g set-titles on
set -g history-limit 10000
setw -g xterm-keys on
set -s escape-time 0
set-window-option -g mode-keys vi
set -g status-justify "centre"

set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# macOS クリップボード連携 (tmux 3.x ではネイティブ対応)
set -g set-clipboard on

# マウス関連
set-option -g mouse on

## COLOUR (Solarized 256)

## pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour240 #base01

## message text
set-option -g message-style fg=colour166,bg=colour235 #orange, base02

## pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

## clock
set-window-option -g clock-mode-colour colour64 #green

## ステータスバー (Powerline 風 / Solarized)
set-option -g status-style fg=colour136,bg=colour235
set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-right-length 60

set-option -g status-left "\
#[fg=colour235,bg=colour136,bold]  #S \
#[fg=colour136,bg=colour235,nobold] "

set-option -g status-right "\
#[fg=colour245,bg=colour235]\
#[fg=colour235,bg=colour245] %Y/%m/%d %H:%M \
#[fg=colour136,bg=colour245]\
#[fg=colour235,bg=colour136,bold]  #h "

set-window-option -g window-status-format "\
#[fg=colour244,bg=colour235] #I:#W "

set-window-option -g window-status-current-format "\
#[fg=colour235,bg=colour166]\
#[fg=colour235,bg=colour166,bold] #I:#W \
#[fg=colour166,bg=colour235]"

unbind %
bind | split-window -h

unbind '"'
bind '-' split-window -v

unbind ^D
bind ^D detach

unbind ^R
bind ^R source-file ~/.tmux.conf\; display-message "reloaded"

unbind ^C
bind ^C new-window
bind c new-window

unbind ^@
unbind ^N
unbind " "
unbind n
bind n next-window

bind-key -n C-Tab next-window
bind-key -n C-S-Tab previous-window

# kill K k
unbind K
unbind C-k
bind k confirm-before "kill-window"

bind -r h resize-pane -L
bind -r l resize-pane -R
bind -r j resize-pane -D
bind -r k resize-pane -U

# ペイン分割解除
unbind !
unbind q
bind q break-pane
